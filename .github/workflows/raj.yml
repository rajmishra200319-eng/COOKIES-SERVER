name: RAJ MISHRA NODE BOT

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"    # हर 15 मिनट में
  push:
    branches: [ main ]          # push पर भी run होगा

jobs:
  bot:
    name: 🔄 RAJ Bot
    runs-on: ubuntu-latest
    
    # 17 मिनट timeout - फिर CRON restart
    timeout-minutes: 17
    
    # ERROR पर भी CONTINUE
    strategy:
      fail-fast: false
      max-parallel: 1
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: 📦 Install Dependencies
        run: |
          echo "📦 Installing packages..."
          npm install
          echo "✅ Dependencies installed"
          
      - name: 📁 Create Files
        run: |
          mkdir -p sessions
          
          # अगर files repo में हैं तो use करो, नहीं तो secrets से
          if [ -f cookies.txt ]; then
            echo "✅ Using existing cookies.txt"
          elif [ -n "${{ secrets.COOKIES }}" ]; then
            echo "${{ secrets.COOKIES }}" > cookies.txt
            echo "✅ cookies.txt created from secrets"
          fi
          
          if [ -f convo.txt ]; then
            echo "✅ Using existing convo.txt"
          elif [ -n "${{ secrets.CONVO }}" ]; then
            echo "${{ secrets.CONVO }}" > convo.txt
            echo "✅ convo.txt created from secrets"
          fi
          
          if [ -f File.txt ]; then
            echo "✅ Using existing File.txt"
          elif [ -n "${{ secrets.MESSAGES }}" ]; then
            echo "${{ secrets.MESSAGES }}" > File.txt
            echo "✅ File.txt created from secrets"
          fi
          
          if [ -f hatersname.txt ]; then
            echo "✅ Using existing hatersname.txt"
          elif [ -n "${{ secrets.HATERS }}" ]; then
            echo "${{ secrets.HATERS }}" > hatersname.txt
            echo "✅ hatersname.txt created from secrets"
          fi
          
          if [ -f lastname.txt ]; then
            echo "✅ Using existing lastname.txt"
          elif [ -n "${{ secrets.LASTNAME }}" ]; then
            echo "${{ secrets.LASTNAME }}" > lastname.txt
            echo "✅ lastname.txt created from secrets"
          fi
          
          # time.txt - default 0
          if [ ! -f time.txt ]; then
            echo "0" > time.txt
            echo "✅ time.txt created with default 0"
          fi
          
          echo ""
          echo "📊 Files Status:"
          ls -la *.txt 2>/dev/null || echo "No text files"
          
      - name: 💾 Restore Cache
        uses: actions/cache@v4
        id: cache
        with:
          path: sessions/
          key: raj-sessions-${{ github.run_id }}
          restore-keys: |
            raj-sessions-
          
      - name: 🚀 Run BOT with AUTO RESTART
        run: |
          # AUTO RESTART SCRIPT
          cat > raj-bot.sh << 'EOF'
          #!/bin/bash
          
          echo "════════════════════════════════════════════"
          echo "🤖 RAJ BOT STARTED at $(date)"
          echo "════════════════════════════════════════════"
          
          SESSION_ID=""
          TOTAL_MSGS=0
          RESTART_COUNT=0
          
          # INFINITE LOOP - कभी नहीं रुकेगा
          while true; do
            RESTART_COUNT=$((RESTART_COUNT + 1))
            
            echo ""
            echo "════════════════════════════════════════════"
            echo "🔄 RESTART #$RESTART_COUNT at $(date)"
            echo "════════════════════════════════════════════"
            
            # पुराने process को kill करो
            pkill -f "node main.js" 2>/dev/null || true
            sleep 3
            
            # नया process start
            echo "▶️ Starting main.js..."
            node main.js &
            BOT_PID=$!
            echo "✅ Bot PID: $BOT_PID"
            sleep 5
            
            # Start messaging
            if [ -z "$SESSION_ID" ]; then
              echo "📤 Starting messaging..."
              RESPONSE=$(curl -s -X POST http://localhost:4000/start \
                -H "Content-Type: application/json" \
                -d '{}' 2>/dev/null)
              
              SESSION_ID=$(echo $RESPONSE | grep -o '"sessionId":"[^"]*"' | cut -d'"' -f4)
              
              if [ -n "$SESSION_ID" ]; then
                echo "✅ Session ID: $SESSION_ID"
                echo $SESSION_ID > session_id.txt
              fi
            fi
            
            echo ""
            echo "📊 Monitoring - Auto restart on error"
            echo "────────────────────────────────────────────"
            
            # Monitor loop
            while true; do
              # Check if process is alive
              if ! kill -0 $BOT_PID 2>/dev/null; then
                echo "❌ Bot died at $(date)"
                break
              fi
              
              # Health check
              if ! curl -s -f http://localhost:4000/health > /dev/null 2>&1; then
                echo "❌ Health check failed at $(date)"
                break
              fi
              
              # Get status (हर 30 sec)
              if [ $((SECONDS % 30)) -eq 0 ]; then
                STATUS=$(curl -s -X POST http://localhost:4000/status \
                  -H "Content-Type: application/json" \
                  -d "{\"sessionId\":\"$SESSION_ID\"}" 2>/dev/null)
                
                NEW_COUNT=$(echo $STATUS | grep -o '"messagesSent":[0-9]*' | cut -d':' -f2)
                
                if [ -n "$NEW_COUNT" ] && [ "$NEW_COUNT" -gt "$TOTAL_MSGS" ]; then
                  TOTAL_MSGS=$NEW_COUNT
                  echo "$(date) | ✅ Messages: $TOTAL_MSGS"
                  echo $TOTAL_MSGS > last_count.txt
                fi
              fi
              
              sleep 5
            done
            
            # यहाँ आए means error हुआ
            echo "⚠️ Error detected! Restarting in 10 seconds..."
            
            # Cleanup
            kill $BOT_PID 2>/dev/null || true
            pkill -f "node main.js" 2>/dev/null || true
            sleep 10
            
            # Loop continue (AUTO RESTART)
          done
          EOF
          
          chmod +x raj-bot.sh
          
          # Start bot
          echo "🚀 Starting RAJ Bot with auto-restart..."
          ./raj-bot.sh &
          BOT_PID=$!
          
          echo "✅ Bot running with PID: $BOT_PID"
          echo ""
          echo "⏱️  This job will run for 14 minutes..."
          echo "────────────────────────────────────────────"
          
          # 14 minutes = 840 seconds
          # 13.5 minutes safe = 810 seconds
          sleep 810
          
          # Time's up
          echo ""
          echo "⏰ 14 minutes complete! Shutting down..."
          
          # Kill everything
          pkill -f "raj-bot.sh" 2>/dev/null || true
          pkill -f "node main.js" 2>/dev/null || true
          
          echo "✅ Job completed. Next run in < 1 minute"
          echo ""
          
      - name: 💾 Save Cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: sessions/
          key: raj-sessions-${{ github.run_id }}
          
      - name: 📤 Upload Backup
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raj-backup-${{ github.run_id }}
          path: |
            sessions/
            last_count.txt
            session_id.txt
          retention-days: 7
          
      - name: 📊 Final Stats
        if: always()
        run: |
          echo ""
          echo "════════════════════════════════════════════"
          echo "📊 RAJ BOT STATS"
          echo "════════════════════════════════════════════"
          echo "Run ID: ${{ github.run_id }}"
          echo "Run Number: ${{ github.run_number }}"
          echo "Trigger: ${{ github.event_name }}"
          echo ""
          
          if [ -f last_count.txt ]; then
            echo "✅ Messages: $(cat last_count.txt)"
          else
            echo "✅ Messages: 0"
          fi
          
          echo ""
          echo "🕒 Next run in: < 1 minute (CRON: */15)"
          echo "════════════════════════════════════════════"
