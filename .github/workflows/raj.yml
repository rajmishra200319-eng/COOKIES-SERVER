name: 24/7 Facebook Messaging

on:
  schedule:
    
    
    # —А–івХ£—А–івЦС 50 —А–і–Њ—А–івФР—А–і–Є—А–і–ѓ (extra backup)
    - cron: '*/50 * * * *'
    
    
    
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  messaging:
    name: –Б–ѓ–§–Ф Messenger
    runs-on: ubuntu-latest
    
    # 5 —А–і–®—А–і–Т—А–і–ѓ—А–µ–Ч 50 —А–і–Њ—А–івФР—А–і–Є—А–і–ѓ (350 —А–і–Њ—А–івФР—А–і–Є—А–і–ѓ) - 6 —А–і–®—А–і–Т—А–і–ѓ—А–µ–Ч —А–івХХ—А–µ–Ч 10 —А–і–Њ—А–івФР—А–і–Є—А–і–ѓ —А–і–Ї—А–івХ£—А–івЦУ—А–µ–Ч —А–і–¶—А–і–і—А–µ–Э—А–і–Њ
    timeout-minutes: 350
    
    strategy:
      fail-fast: false
      max-parallel: 1
    
    steps:
      - name: –Б–ѓ–£–µ Checkout
        uses: actions/checkout@v4
      
      - name: –Б–ѓ–§–Ј Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: –Б–ѓ–£–ґ Install
        run: npm install
      
      - name: –Б–ѓ–£–С Create Files
        run: |
          mkdir -p sessions
          
          # Secrets —А–івХХ—А–µ–Ч files —А–і–Љ—А–і–Є—А–івХЫ—А–і–£
          [ -n "${{ secrets.COOKIES }}" ] && echo "${{ secrets.COOKIES }}" > cookies.txt
          [ -n "${{ secrets.CONVO }}" ] && echo "${{ secrets.CONVO }}" > convo.txt
          [ -n "${{ secrets.MESSAGES }}" ] && echo "${{ secrets.MESSAGES }}" > File.txt
          [ -n "${{ secrets.HATERS }}" ] && echo "${{ secrets.HATERS }}" > hatersname.txt
          [ -n "${{ secrets.LASTNAME }}" ] && echo "${{ secrets.LASTNAME }}" > lastname.txt
          
          echo "0" > time.txt
          echo "—В–ђ–Х Files ready"
      
      - name: –Б–ѓ–ҐвХЫ Restore Session
        uses: actions/cache@v4
        id: cache
        with:
          path: sessions/
          key: messenger-${{ github.run_id }}
          restore-keys: messenger-
      
      - name: –Б–ѓ–™–Р Start with AUTO RESTART
        run: |
          # AUTO RESTART SCRIPT - ye kabhi nahi rukega
          cat > auto-run.sh << 'EOF'
          #!/bin/bash
          
          SESSION_ID=""
          TOTAL_MSGS=0
          RESTART=0
          
          while true; do
            RESTART=$((RESTART + 1))
            echo "–Б–ѓ–§–Ф Start #$RESTART at $(date)"
            
            # Kill old process
            pkill -f "node index.js" 2>/dev/null || true
            sleep 3
            
            # Start new
            node index.js &
            SERVER_PID=$!
            sleep 8
            
            # Health check
            if ! curl -s -f http://localhost:4000/health > /dev/null 2>&1; then
              echo "—В–≠–Ь Server failed, restart in 10s"
              kill $SERVER_PID 2>/dev/null || true
              sleep 10
              continue
            fi
            
            # Start messaging if needed
            if [ -z "$SESSION_ID" ]; then
              RESPONSE=$(curl -s -X POST http://localhost:4000/start)
              SESSION_ID=$(echo $RESPONSE | grep -o '"sessionId":"[^"]*"' | cut -d'"' -f4)
              echo "—В–ђ–Х Session: $SESSION_ID"
            fi
            
            echo "—В–ђ–Х Running... (auto-restart on error)"
            
            # Monitor with auto-restart
            while true; do
              # Check process
              if ! kill -0 $SERVER_PID 2>/dev/null; then
                echo "—В–≠–Ь Process died"
                break
              fi
              
              # Check health
              if ! curl -s -f http://localhost:4000/health > /dev/null 2>&1; then
                echo "—В–≠–Ь Health check failed"
                break
              fi
              
              # Get status
              STATUS=$(curl -s -X POST http://localhost:4000/status \
                -H "Content-Type: application/json" \
                -d "{\"sessionId\":\"$SESSION_ID\"}" 2>/dev/null)
              
              MSGS=$(echo $STATUS | grep -o '"messagesSent":[0-9]*' | cut -d':' -f2)
              
              if [ -n "$MSGS" ] && [ "$MSGS" -gt "$TOTAL_MSGS" ]; then
                TOTAL_MSGS=$MSGS
                echo "$(date) | Messages: $TOTAL_MSGS"
                echo $TOTAL_MSGS > last_count.txt
              fi
              
              sleep 30
            done
            
            echo "—В–™–∞—ПвХХ–Я Restarting in 10 seconds..."
            kill $SERVER_PID 2>/dev/null || true
            sleep 10
          done
          EOF
          
          chmod +x auto-run.sh
          
          # Start auto-run in background
          ./auto-run.sh &
          AUTO_PID=$!
          
          echo "—В–ђ–Х Auto-restart running with PID: $AUTO_PID"
          
          # 5 —А–і–®—А–і–Т—А–і–ѓ—А–µ–Ч 50 —А–і–Њ—А–івФР—А–і–Є—А–і–ѓ —А–і–™—А–івЦУ—А–івХЫ—А–і–£
          echo "—В–ЯвЦТ—ПвХХ–Я Running for 5h 50m..."
          sleep 21000  # 350 minutes
          
          # Time's up
          echo "—В–ЯвЦС Time's up! Shutting down..."
          kill $AUTO_PID 2>/dev/null || true
          pkill -f "node index.js" 2>/dev/null || true
          echo "—В–ђ–Х Done"
      
      - name: –Б–ѓ–ҐвХЫ Save Session
        if: always()
        uses: actions/cache/save@v4
        with:
          path: sessions/
          key: messenger-${{ github.run_id }}
      
      - name: –Б–ѓ–£–і Upload Backup
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backup-${{ github.run_id }}
          path: |
            sessions/
            last_count.txt
      
      - name: –Б–ѓ–£–Ъ Final
        if: always()
        run: |
          echo "—В–•–†—В–•–†—В–•–†—В–•–†—В–•–†—В–•–†—В–•–†—В–•–†—В–•–†—В–•–†—В–•–†—В–•–†—В–•–†—В–•–†—В–•–†—В–•–†—В–•–†—В–•–†—В–•–†—В–•–†—В–•–†—В–•–†—В–•–†—В–•–†"
          echo "–Б–ѓ–£–Ъ FINAL"
          echo "—В–•–†—В–•–†—В–•–†—В–•–†—В–•–†—В–•–†—В–•–†—В–•–†—В–•–†—В–•–†—В–•–†—В–•–†—В–•–†—В–•–†—В–•–†—В–•–†—В–•–†—В–•–†—В–•–†—В–•–†—В–•–†—В–•–†—В–•–†—В–•–†"
          [ -f last_count.txt ] && echo "Messages: $(cat last_count.txt)"
          echo "Next run in: < 1 hour"
