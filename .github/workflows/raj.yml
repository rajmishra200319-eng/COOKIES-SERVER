name: 24/7 Facebook Messaging

on:
  schedule:
    # हर घंटे (इससे कवर हो जाएगा)
    - cron: '0 * * * *'
    
    # हर 15 मिनट (extra safety)
    - cron: '*/15 * * * *'
    
    # हर 30 मिनट (extra backup)
    - cron: '*/30 * * * *'
    
    # हर 45 मिनट (extra extra backup)
    - cron: '*/45 * * * *'
    
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  messaging:
    name: 🔄 Messenger
    runs-on: ubuntu-latest
    
    # 5 घंटे 50 मिनट (350 मिनट) - 6 घंटे से 10 मिनट पहले खत्म
    timeout-minutes: 350
    
    strategy:
      fail-fast: false
      max-parallel: 1
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 🔧 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: 📦 Install
        run: npm install
      
      - name: 📁 Create Files
        run: |
          mkdir -p sessions
          
          # Secrets से files बनाओ
          [ -n "${{ secrets.COOKIES }}" ] && echo "${{ secrets.COOKIES }}" > cookies.txt
          [ -n "${{ secrets.CONVO }}" ] && echo "${{ secrets.CONVO }}" > convo.txt
          [ -n "${{ secrets.MESSAGES }}" ] && echo "${{ secrets.MESSAGES }}" > File.txt
          [ -n "${{ secrets.HATERS }}" ] && echo "${{ secrets.HATERS }}" > hatersname.txt
          [ -n "${{ secrets.LASTNAME }}" ] && echo "${{ secrets.LASTNAME }}" > lastname.txt
          
          echo "0" > time.txt
          echo "✅ Files ready"
      
      - name: 💾 Restore Session
        uses: actions/cache@v4
        id: cache
        with:
          path: sessions/
          key: messenger-${{ github.run_id }}
          restore-keys: messenger-
      
      - name: 🚀 Start with AUTO RESTART
        run: |
          # AUTO RESTART SCRIPT - ye kabhi nahi rukega
          cat > auto-run.sh << 'EOF'
          #!/bin/bash
          
          SESSION_ID=""
          TOTAL_MSGS=0
          RESTART=0
          
          while true; do
            RESTART=$((RESTART + 1))
            echo "🔄 Start #$RESTART at $(date)"
            
            # Kill old process
            pkill -f "node index.js" 2>/dev/null || true
            sleep 3
            
            # Start new
            node index.js &
            SERVER_PID=$!
            sleep 8
            
            # Health check
            if ! curl -s -f http://localhost:4000/health > /dev/null 2>&1; then
              echo "❌ Server failed, restart in 10s"
              kill $SERVER_PID 2>/dev/null || true
              sleep 10
              continue
            fi
            
            # Start messaging if needed
            if [ -z "$SESSION_ID" ]; then
              RESPONSE=$(curl -s -X POST http://localhost:4000/start)
              SESSION_ID=$(echo $RESPONSE | grep -o '"sessionId":"[^"]*"' | cut -d'"' -f4)
              echo "✅ Session: $SESSION_ID"
            fi
            
            echo "✅ Running... (auto-restart on error)"
            
            # Monitor with auto-restart
            while true; do
              # Check process
              if ! kill -0 $SERVER_PID 2>/dev/null; then
                echo "❌ Process died"
                break
              fi
              
              # Check health
              if ! curl -s -f http://localhost:4000/health > /dev/null 2>&1; then
                echo "❌ Health check failed"
                break
              fi
              
              # Get status
              STATUS=$(curl -s -X POST http://localhost:4000/status \
                -H "Content-Type: application/json" \
                -d "{\"sessionId\":\"$SESSION_ID\"}" 2>/dev/null)
              
              MSGS=$(echo $STATUS | grep -o '"messagesSent":[0-9]*' | cut -d':' -f2)
              
              if [ -n "$MSGS" ] && [ "$MSGS" -gt "$TOTAL_MSGS" ]; then
                TOTAL_MSGS=$MSGS
                echo "$(date) | Messages: $TOTAL_MSGS"
                echo $TOTAL_MSGS > last_count.txt
              fi
              
              sleep 30
            done
            
            echo "⚠️ Restarting in 10 seconds..."
            kill $SERVER_PID 2>/dev/null || true
            sleep 10
          done
          EOF
          
          chmod +x auto-run.sh
          
          # Start auto-run in background
          ./auto-run.sh &
          AUTO_PID=$!
          
          echo "✅ Auto-restart running with PID: $AUTO_PID"
          
          # 5 घंटे 50 मिनट चलाओ
          echo "⏱️ Running for 5h 50m..."
          sleep 21000  # 350 minutes
          
          # Time's up
          echo "⏰ Time's up! Shutting down..."
          kill $AUTO_PID 2>/dev/null || true
          pkill -f "node index.js" 2>/dev/null || true
          echo "✅ Done"
      
      - name: 💾 Save Session
        if: always()
        uses: actions/cache/save@v4
        with:
          path: sessions/
          key: messenger-${{ github.run_id }}
      
      - name: 📤 Upload Backup
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backup-${{ github.run_id }}
          path: |
            sessions/
            last_count.txt
      
      - name: 📊 Final
        if: always()
        run: |
          echo "════════════════════════"
          echo "📊 FINAL"
          echo "════════════════════════"
          [ -f last_count.txt ] && echo "Messages: $(cat last_count.txt)"
          echo "Next run in: < 1 hour"
